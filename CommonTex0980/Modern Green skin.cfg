// Interface texture file name
InterfaceTexture	"interface_mod.*"

// Color conversion of the interface texture: Hue, Saturation, Lightness
TextureHSL           (-90 -20 0)

// Multipliers of the window/control colors in format R, G, B, Alpha (opacity)
WinColorNormal       (1.0 1.0 1.0 0.8)	// normal window/control
WinColorHighlighted  (1.0 1.0 1.0 0.8)	// highlighted window/control
WinColorActive       (1.0 1.0 1.0 0.8)	// active window/control
WinColorDisabled     (0.6 0.6 0.6 0.8)	// disabled window/control

// Multipliers of the text colors in format R, G, B, Alpha (opacity)
TextColorNormal      (0.7 0.7 0.7 0.7)	// normal text
TextColorHighlighted (1.0 1.0 1.0 1.0)	// highlighted text
TextColorActive      (1.0 1.0 1.0 1.0)	// active text
TextColorDisabled    (0.3 0.3 0.3 1.0)	// disabled text

// Color of selection frame and rectangle
SelectFrameColor     (1.0 1.0 1.0 1.0)
SelectQuadColor      (0.1 0.2 0.1 0.0)

// Color of table bands
TableBandColor       (0.1 0.1 0.1 0.0)

// Colors of on-screen text
ObjectInfoColor      (0.8 1.0 0.8 1.0)
FPSCounterColor      (1.0 0.7 1.0 1.0)
ShipHUDColor         (0.3 1.0 0.3 1.0)

// Colors of pointers
SelectionPointerColor    (0.8 1.0 0.8 1.0)
JoystickPointerColor     (0.8 1.0 0.8 1.0)
VelocityPointerColor     (0.5 1.0 1.0 1.0)
ShipRefBodyPointerColor  (1.0 1.0 0.5 1.0)
ShipTargetPointerColor   (1.0 0.2 0.2 1.0)
ShipVelocityPointerColor (1.0 0.2 0.2 1.0)

// Colors of overlays
CelEquatorGridColor      (0.0 0.6 0.6 1.0)